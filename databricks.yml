bundle:
  name: quant-core-poc

include:
  - resources/*.yml

variables:
  target_yyyymm:
    description: Month to process in YYYYMM format
    default: "202604"
  catalog_name:
    description: Unity Catalog catalog name
    default: "quant_core"

# Sync notebooks and source code to workspace
sync:
  include:
    - "notebooks/**/*.py"
    - "src/**/*.py"
    - "scripts/**/*.py"
    - "config/**/*.yaml"
    - "sql/**/*.sql"
  exclude:
    - "*.pyc"
    - "__pycache__"
    - ".git"
    - "tests"

# Development environment (default)
targets:
  dev:
    mode: development
    default: true
    workspace:
      host: ${DATABRICKS_HOST}
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    
    variables:
      catalog_name: quant_core_dev
      target_yyyymm: "202604"
    
    resources:
      jobs:
        quant_core_monthly_pipeline:
          permissions:
            - level: CAN_VIEW
              group_name: users

  # Staging environment
  staging:
    mode: production
    workspace:
      host: ${DATABRICKS_STAGING_HOST}
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    
    variables:
      catalog_name: quant_core_staging
      target_yyyymm: "202604"
    
    resources:
      jobs:
        quant_core_monthly_pipeline:
          permissions:
            - level: CAN_VIEW
              group_name: users
            - level: CAN_MANAGE_RUN
              group_name: data_engineers
          
          schedule:
            quartz_cron_expression: "0 0 2 1 * ?"  # 2 AM on 1st of each month
            timezone_id: "Asia/Kolkata"
            pause_status: UNPAUSED
          
          email_notifications:
            on_failure:
              - data-team@company.com
            on_success:
              - data-team@company.com

  # Production environment
  prod:
    mode: production
    workspace:
      host: ${DATABRICKS_PROD_HOST}
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    
    variables:
      catalog_name: quant_core
      target_yyyymm: "202604"
    
    resources:
      jobs:
        quant_core_monthly_pipeline:
          permissions:
            - level: CAN_VIEW
              group_name: users
            - level: CAN_MANAGE_RUN
              group_name: data_engineers
            - level: IS_OWNER
              group_name: data_platform_admins
          
          schedule:
            quartz_cron_expression: "0 0 2 1 * ?"  # 2 AM on 1st of each month
            timezone_id: "Asia/Kolkata"
            pause_status: UNPAUSED
          
          email_notifications:
            on_failure:
              - data-team@company.com
              - platform-alerts@company.com
            on_success:
              - data-team@company.com
          
          max_retries: 2
          retry_on_timeout: true
          timeout_seconds: 7200  # 2 hours
          
          tags:
            environment: production
            team: quant-core
            cost_center: analytics
